<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SN Dispatcher — Config</title>
<style>
:root {
  --bg:      #0d1117; --panel:  #161b22; --border: #1f2937;
  --border2: #2d3748; --blue:   #0070d2; --blue2:  #38bdf8;
  --green:   #4ade80; --red:    #f87171; --yellow: #fbbf24;
  --text:    #e2e8f0; --muted:  #64748b; --muted2: #4a5568;
  --accent:  #0d2137;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}
.header {
  background: var(--panel); border-bottom: 1px solid var(--border);
  padding: 12px 24px; display: flex; align-items: center;
  justify-content: space-between; flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.logo {
  width: 32px; height: 32px; background: var(--blue); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 900; color: #fff; flex-shrink: 0;
}
.header-title { font-size: 16px; font-weight: 700; }
.header-sub   { font-size: 11px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.notice {
  font-size: 11px; color: var(--muted); background: var(--panel);
  border: 1px solid var(--border2); border-radius: 6px; padding: 5px 12px;
  display: flex; align-items: center; gap: 6px;
}
.notice b { color: var(--blue2); }
.btn {
  border: none; border-radius: 6px; cursor: pointer;
  font-size: 12px; font-weight: 700; padding: 7px 14px;
  transition: all 0.15s; white-space: nowrap;
}
.btn-primary { background: var(--blue); color: #fff; }
.btn-primary:hover { background: #0055a5; }
.btn-red   { background: #dc2626; color: #fff; }
.btn-red:hover { background: #b91c1c; }
.btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border2); }
.btn-ghost:hover { color: var(--text); border-color: var(--muted); }
.btn-icon  { background: transparent; border: none; cursor: pointer; color: var(--muted); padding: 4px 8px; border-radius: 4px; }
.btn-icon:hover { background: var(--border); color: var(--text); }
.main { display: flex; flex: 1; overflow: hidden; }
.sidebar {
  width: 260px; border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0;
}
.sidebar-header {
  padding: 12px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.sidebar-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
.group-list { flex: 1; overflow-y: auto; }
.group-item {
  padding: 12px 14px; cursor: pointer; border-bottom: 1px solid var(--border);
  border-left: 3px solid transparent; transition: background 0.1s;
  display: flex; align-items: center; justify-content: space-between;
}
.group-item:hover { background: var(--panel); }
.group-item.active { background: var(--accent); border-left-color: var(--blue); }
.group-item-name { font-weight: 600; font-size: 13px; }
.group-item-meta { font-size: 10px; color: var(--muted); margin-top: 2px; }
.group-badge {
  font-size: 10px; font-weight: 700; padding: 2px 7px;
  border-radius: 10px; background: var(--border2); color: var(--muted);
}
.group-badge.running { background: rgba(74,222,128,0.15); color: var(--green); }
.empty-sidebar { padding: 24px 14px; text-align: center; color: var(--muted2); font-size: 11px; line-height: 1.8; }
.editor { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.editor-header {
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.editor-title { font-size: 15px; font-weight: 700; }
.editor-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 18px; }
.field-group { display: flex; flex-direction: column; gap: 6px; }
.field-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
.field-input {
  background: var(--panel); border: 1px solid var(--border2); border-radius: 6px;
  padding: 8px 12px; color: var(--text); font-size: 12px; outline: none; width: 100%;
}
.field-input:focus { border-color: var(--blue); }
.field-input::placeholder { color: var(--muted2); }
.url-converter { background: var(--panel); border: 1px solid var(--border2); border-radius: 8px; padding: 14px; }
.url-converter-title { font-size: 11px; font-weight: 700; color: var(--blue2); margin-bottom: 6px; }
.url-row { display: flex; gap: 8px; }
.url-input {
  flex: 1; background: var(--bg); border: 1px solid var(--border2); border-radius: 6px;
  padding: 7px 10px; color: var(--text); font-size: 11px; outline: none; font-family: monospace;
}
.url-input:focus { border-color: var(--blue); }
.agent-item {
  background: var(--panel); border: 1px solid var(--border2); border-radius: 8px;
  padding: 10px 14px; display: flex; align-items: center; gap: 10px;
}
.agent-item.inactive { opacity: 0.5; }
.agent-del { color: var(--red); font-size: 16px; cursor: pointer; padding: 0 4px; }
.agent-del:hover { color: #fff; }
.add-agent-row {
  display: flex; gap: 8px; background: var(--panel);
  border: 1px dashed var(--border2); border-radius: 8px; padding: 10px;
}
.add-agent-row input { background: var(--bg); border: 1px solid var(--border2); border-radius: 5px; padding: 6px 10px; color: var(--text); font-size: 11px; outline: none; }
.add-agent-row input:focus { border-color: var(--blue); }
.editor-empty {
  flex: 1; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 10px; color: var(--muted2); text-align: center;
}
.editor-empty-icon { font-size: 36px; }
.toggle-wrap { display: flex; align-items: center; gap: 8px; }
.toggle {
  position: relative; width: 36px; height: 20px;
  background: var(--border2); border-radius: 10px; cursor: pointer; transition: background 0.2s;
}
.toggle.on { background: var(--blue); }
.toggle::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 16px; height: 16px; border-radius: 50%; background: #fff; transition: transform 0.2s;
}
.toggle.on::after { transform: translateX(16px); }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
.toast {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
  background: var(--panel); color: var(--text); padding: 9px 18px;
  border-radius: 7px; font-size: 12px; font-weight: 600;
  box-shadow: 0 4px 16px rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.3s;
  pointer-events: none; white-space: nowrap; z-index: 9999;
  border: 1px solid var(--border2);
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">🎯</div>
    <div>
      <div class="header-title">SN Dispatcher</div>
      <div class="header-sub">Configuration · changes apply instantly to the widget on any open SN tab</div>
    </div>
  </div>
  <div class="header-right">
    <div class="notice">⚙ Config only — engine runs <b>on the SN tab</b></div>
    <button class="btn btn-ghost" id="btnExport" style="padding:6px 12px;">⬆ Export</button>
    <button class="btn btn-ghost" id="btnImport" style="padding:6px 12px;">⬇ Import</button>
    <input type="file" id="importFileInput" accept=".json" style="display:none;">
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Assignment Groups</span>
      <button class="btn btn-primary" id="btnAddGroup" style="padding:5px 10px;font-size:11px;">+ Add Group</button>
    </div>
    <div class="group-list" id="groupList">
      <div class="empty-sidebar">No groups yet.<br>Click <strong>+ Add Group</strong> to start.</div>
    </div>
  </div>

  <div class="editor" id="editorPanel">
    <div class="editor-empty">
      <div class="editor-empty-icon">👥</div>
      <div>Select a group to configure<br>or click <strong>+ Add Group</strong></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="config.js"></script>
</body>
</html>
