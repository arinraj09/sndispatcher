<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 220px;
  background: #0d1117;
  color: #e2e8f0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  padding: 16px;
}
.logo-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
}
.logo {
  width: 28px; height: 28px; background: #0070d2; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 900; color: #fff;
}
.title { font-size: 14px; font-weight: 700; }
.sub   { font-size: 10px; color: #64748b; margin-top: 1px; }
.hint  {
  font-size: 11px; color: #64748b; line-height: 1.6; margin-bottom: 12px;
  background: #161b22; border-radius: 6px; padding: 8px 10px;
  border: 1px solid #1f2937;
}
.hint b { color: #38bdf8; }
button {
  width: 100%; background: #0070d2; color: #fff;
  border: none; border-radius: 7px; padding: 9px;
  font-size: 12px; font-weight: 700; cursor: pointer;
}
button:hover { background: #0055a5; }
</style>
</head>
<body>
<div class="logo-row">
  <div class="logo">🎯</div>
  <div>
    <div class="title">SN Dispatcher</div>
    <div class="sub">v2.1</div>
  </div>
</div>
<div class="hint">
  The widget runs <b>inside your ServiceNow tab</b>.<br>
  Open any <b>*.service-now.com</b> or <b>mercedes-benz.com</b> page to see it.
</div>
<button id="btnConfig">⚙ Open Configuration</button>
<script src="popup.js"></script>
</body>
</html>
